basePath: /api/v1
definitions:
  domain.Alert:
    properties:
      acknowledged_at:
        type: string
      acknowledged_by:
        type: string
      id:
        type: integer
      is_acknowledged:
        type: boolean
      locomotive_id:
        type: integer
      message:
        type: string
      parameter_name:
        type: string
      resolved_at:
        type: string
      severity:
        description: warning | critical
        type: string
      threshold_value:
        type: number
      ts:
        type: string
      value:
        type: number
    type: object
  domain.AuthResponse:
    properties:
      token:
        type: string
    type: object
  domain.Event:
    properties:
      created_by:
        type: string
      description:
        type: string
      event_type:
        description: incident | maintenance | note | replay_mark
        type: string
      id:
        type: integer
      locomotive_id:
        type: integer
      telemetry_snapshot:
        type: object
      ts:
        type: string
    type: object
  domain.HealthSnapshot:
    properties:
      health_score:
        type: number
      id:
        type: integer
      locomotive_id:
        type: integer
      top_factors:
        items:
          type: object
        type: array
      ts:
        type: string
    type: object
  domain.Locomotive:
    properties:
      depot:
        type: string
      id:
        type: integer
      manufacturer:
        type: string
      model:
        type: string
      number:
        type: string
      power_type:
        description: diesel | electric
        type: string
      status:
        description: active | maintenance
        type: string
      type:
        description: cargo | passenger
        type: string
      year_built:
        type: integer
    type: object
  domain.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  domain.RegisterRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  domain.Telemetry:
    properties:
      ambient_temp:
        type: number
      battery_voltage:
        type: number
      brake_cylinder_pressure:
        type: number
      brake_pipe_pressure:
        type: number
      engine_rpm:
        type: number
      engine_temp:
        type: number
      fuel_consumption:
        type: number
      fuel_level:
        type: number
      gps_lat:
        type: number
      gps_lon:
        type: number
      health:
        type: number
      inverter_temp:
        type: number
      locomotive_id:
        type: integer
      main_reservoir_pressure:
        type: number
      oil_pressure:
        type: number
      oil_temp:
        type: number
      pantograph_voltage:
        type: number
      speed:
        type: number
      traction_current:
        type: number
      traction_force:
        type: number
      traction_voltage:
        type: number
      ts:
        type: string
      wheel_slip:
        type: number
    type: object
  domain.TelemetryLimits:
    properties:
      ambient_temp_critical_max:
        type: number
      ambient_temp_critical_min:
        type: number
      ambient_temp_max:
        type: number
      ambient_temp_min:
        type: number
      ambient_temp_warning_max:
        type: number
      ambient_temp_warning_min:
        type: number
      battery_voltage_critical_max:
        type: number
      battery_voltage_critical_min:
        type: number
      battery_voltage_max:
        type: number
      battery_voltage_min:
        type: number
      battery_voltage_warning_max:
        type: number
